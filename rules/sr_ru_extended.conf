# Shadowrocket extension for sr_ru_basic.conf
# Stable local filename: sr_ru_extended.conf
# Purpose: keep only pointers here; update real rules in GitHub without redistributing this file.
# GitHub account/repo placeholder: jeerom/shadowrocket-rules
# Local base config should contain: include = sr_ru_extended.conf

[General]
# Optional: extra TUN routes for services that often connect by raw IP.
# Keep this list conservative. Telegram official IPv4 ranges are included because Telegram often bypasses DNS.
tun-included-routes = 91.105.192.0/23,91.108.4.0/22,91.108.8.0/22,91.108.12.0/22,91.108.16.0/22,91.108.20.0/22,91.108.56.0/22,149.154.160.0/20,185.76.151.0/24,52.33.95.61/32

[Rule]
# 0. Critical Brawl Stars game server from log PacketTunnel-20260426185223.log.
# game.brawlstarsgame.com resolved to 52.33.95.61; connection 52.33.95.61:9339 was routed by FINAL,DIRECT.
# This explicit rule must be before RULE-SET and before GEOIP/FINAL.
IP-CIDR,52.33.95.61/32,PROXY,no-resolve

# 1. DIRECT exceptions first. Banking, Apple/iCloud and local services must not be proxied.
RULE-SET,https://raw.githubusercontent.com/jeerom/shadowrocket-rules/main/rules/sr_ru_direct.list,DIRECT

# 2. PROXY rules before REJECT. This prevents ad/analytics filters from breaking game launch/auth.
RULE-SET,https://raw.githubusercontent.com/jeerom/shadowrocket-rules/main/rules/sr_ru_proxy.list,PROXY

# 3. REJECT only after DIRECT and PROXY.
RULE-SET,https://raw.githubusercontent.com/jeerom/shadowrocket-rules/main/rules/sr_ru_reject.list,REJECT

# 4. Raw Russian IP destinations are always DIRECT.
GEOIP,RU,DIRECT

FINAL,DIRECT
